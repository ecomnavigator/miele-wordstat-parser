services:
  metabase:
    image: metabase/metabase:latest
    container_name: miele-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_SITE_NAME: Miele SERP BI
    volumes:
      - metabase-data:/metabase-data
      - ${DATA_ROOT:-/home/maksim/miele-data}/exports/bi:/exports/bi:ro
    restart: unless-stopped

volumes:
  metabase-data:
